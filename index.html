<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator CO₂</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Kalkulator Śladu Węglowego</h1>

<p class="info">
Możesz wpisywać liczby dziesiętne (np. 2.5 lub 2,5) 
</p>

<form method="POST">

<h2> Transport</h2>
<input name="car" placeholder="Samochód km/dzień">
<input name="bus" placeholder="Autobus km/dzień">
<input name="bike" placeholder="Rower km/dzień">
<input name="train" placeholder="Pociąg km/miesiąc">
<input name="flight" placeholder="Loty godziny/rok">

<h2> Dieta</h2>
<input name="meat" placeholder="Posiłki mięsne/tydz">
<input name="dairy" placeholder="Nabiał dziennie">
<input name="waste_food" placeholder="Marnowanie jedzenia kg/tydz">

<h2> Energia</h2>
<input name="power" placeholder="Prąd kWh/miesiąc">
<input name="heating" placeholder="Ogrzewanie">

<h2> Styl życia</h2>
<input name="clothes" placeholder="Ubrania/rok">
<input name="electronics" placeholder="Elektronika/rok">

<h2> Odpady</h2>
<input name="recycling" placeholder="Recykling %">

<h2> Woda</h2>
<input name="water" placeholder="Litry/dzień">

<button type="submit">Oblicz</button>

</form>

{% if result is not none %}
<div class="result">
    Twój ślad CO₂: <b>{{ result|round(0) }} kg/rok</b>
</div>

<div class="advice">
     {{ advice }}
</div>
{% endif %}

</body>
</html>
